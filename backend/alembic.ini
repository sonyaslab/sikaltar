# A generic, single database configuration.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os  # Use os.pathsep

# sqlalchemy.url diambil dari environment variable DATABASE_URL
# Lihat migrations/env.py untuk konfigurasi dinamis
sqlalchemy.url = postgresql://simultan:simultan2024@localhost:5432/simultan_db

[post_write_hooks]
# Tidak ada post-write hooks

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
