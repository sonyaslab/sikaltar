# SIKALTARA — deploy produksi (1 server)
# Jalankan:  docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Tidak meng-expose port ke publik — hanya internal docker network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      APP_ORIGIN: https://${DOMAIN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
    expose:
      - "8000"     # hanya untuk caddy, tidak ke publik

  # (OPSIONAL) worker Celery — aktifkan jika sudah membuat app/celery_app.py
  # worker:
  #   build: { context: ., dockerfile: Dockerfile }
  #   restart: unless-stopped
  #   depends_on: [db, redis]
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  #     REDIS_URL: redis://redis:6379/0
  #   command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info"]

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
