server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # ── Frontend Static Files ────────────────────────────────────
    root /usr/share/nginx/html;

    # SPA fallback: semua route yang tidak match → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ke FastAPI ─────────────────────────────────────
    location ~ ^/(auth|api|admin|health|docs|redoc)(/|$) {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── SSE Streaming (cascade events) ──────────────────────────
    # Harus tanpa buffering agar event sampai real-time ke browser
    location /api/cascade-events {
        proxy_pass             http://app:8000;
        proxy_http_version     1.1;
        proxy_set_header       Connection    '';
        proxy_set_header       Cache-Control 'no-cache';
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;  # SSE koneksi panjang
        chunked_transfer_encoding on;
        add_header             X-Accel-Buffering no;
    }

    # ── Keamanan: sembunyikan versi Nginx ───────────────────────
    server_tokens off;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Cache static assets ──────────────────────────────────────
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
